server:
  port: 8081

spring:
  application:
    name: hospital-vm

  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/dh_hospital_vm
    username: root
    password: "" # Se usan comillas dobles para representar un valor vacío

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

# Configuración de Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

# Configuración de Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    lease-renewal-interval-in-seconds: 30